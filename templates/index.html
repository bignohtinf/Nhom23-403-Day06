<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vinno AI — Tư vấn xe điện</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" />
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ── Reset & base ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-main:     #212121;
  --bg-sidebar:  #171717;
  --bg-input:    #2f2f2f;
  --bg-user:     #2f2f2f;
  --bg-hover:    #2a2a2a;
  --bg-active:   #3a3a3a;
  --border:      #404040;
  --text-primary:#ececec;
  --text-muted:  #8e8ea0;
  --text-dim:    #666;
  --accent:      #1565c0;
  --accent-light:#1976d2;
  --accent-glow: rgba(21,101,192,.25);
  --danger:      #c0392b;
  --radius:      12px;
  --radius-sm:   8px;
  --font:        'Inter', system-ui, sans-serif;
  --sidebar-w:   260px;
  --transition:  .18s ease;
}
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font);
  background: var(--bg-main);
  color: var(--text-primary);
  display: flex;
  font-size: 15px;
  line-height: 1.6;
}
button { cursor: pointer; border: none; background: none; font-family: inherit; }
input, textarea { font-family: inherit; }
a { color: var(--accent-light); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Scrollbar ────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #555; }

/* ── Sidebar ──────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--bg-sidebar);
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  height: 100vh;
  overflow: hidden;
  transition: width var(--transition);
}
.sidebar-header {
  padding: 16px 14px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.logo-badge {
  width: 34px; height: 34px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px; color: #fff; flex-shrink: 0;
}
.logo-text { font-size: 14px; font-weight: 600; color: var(--text-primary); line-height: 1.2; }
.logo-text span { color: var(--text-muted); font-weight: 400; font-size: 11px; display: block; }

#btn-new-chat {
  margin: 12px 10px;
  padding: 10px 14px;
  background: var(--accent);
  color: #fff;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  display: flex; align-items: center; gap: 8px;
  transition: background var(--transition);
  flex-shrink: 0;
}
#btn-new-chat:hover { background: var(--accent-light); }
#btn-new-chat svg { flex-shrink: 0; }

.sessions-label {
  padding: 6px 14px 4px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: .6px;
  flex-shrink: 0;
}
#session-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 8px 8px;
}
.session-item {
  display: flex; align-items: center;
  gap: 8px;
  padding: 9px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background var(--transition);
  position: relative;
  group: true;
}
.session-item:hover { background: var(--bg-hover); }
.session-item.active { background: var(--bg-active); }
.session-icon { color: var(--text-muted); flex-shrink: 0; }
.session-text {
  flex: 1; min-width: 0;
  font-size: 13px;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.session-count {
  font-size: 11px;
  color: var(--text-dim);
  flex-shrink: 0;
}
.session-delete {
  display: none;
  color: var(--text-muted);
  padding: 2px;
  border-radius: 4px;
  flex-shrink: 0;
  font-size: 16px;
  line-height: 1;
}
.session-item:hover .session-delete { display: block; }
.session-delete:hover { color: var(--danger); background: rgba(192,57,43,.15); }

.sidebar-footer {
  padding: 12px 14px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-dim);
  flex-shrink: 0;
  display: flex; align-items: center; gap: 6px;
}

/* ── Main ─────────────────────────────────────────────── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  min-width: 0;
}

/* ── Top bar ──────────────────────────────────────────── */
#topbar {
  height: 54px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 20px;
  gap: 12px;
  flex-shrink: 0;
  background: var(--bg-main);
}
#topbar-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-muted);
  flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#btn-clear {
  padding: 6px 12px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  font-size: 12px;
  transition: all var(--transition);
  display: flex; align-items: center; gap: 6px;
}
#btn-clear:hover { border-color: var(--danger); color: var(--danger); background: rgba(192,57,43,.08); }

/* ── Messages ─────────────────────────────────────────── */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 0 12px;
}
.msg-wrap {
  padding: 6px 20px;
  display: flex;
  gap: 14px;
  max-width: 880px;
  margin: 0 auto;
  width: 100%;
  animation: fadeUp .2s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  margin-top: 2px;
}
.avatar.user {
  background: linear-gradient(135deg, #1565c0, #0d47a1);
  color: #fff;
}
.avatar.bot {
  background: linear-gradient(135deg, #1b5e20, #2e7d32);
  color: #fff;
  font-size: 11px;
}
.msg-body { flex: 1; min-width: 0; }
.msg-name {
  font-size: 12px; font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 5px;
  display: flex; align-items: center; gap: 8px;
}
.msg-time { font-weight: 400; color: var(--text-dim); font-size: 11px; }
.msg-content {
  color: var(--text-primary);
  line-height: 1.7;
  word-break: break-word;
}
.msg-content.user-content {
  background: var(--bg-user);
  border-radius: var(--radius);
  padding: 10px 14px;
  display: inline-block;
  max-width: 100%;
}
/* Markdown styles */
.msg-content h1,.msg-content h2,.msg-content h3 {
  font-weight: 600; margin: 12px 0 6px; color: var(--text-primary);
}
.msg-content h1 { font-size: 1.2em; }
.msg-content h2 { font-size: 1.1em; }
.msg-content h3 { font-size: 1em; }
.msg-content p { margin: 6px 0; }
.msg-content ul, .msg-content ol { padding-left: 20px; margin: 6px 0; }
.msg-content li { margin: 3px 0; }
.msg-content strong { color: #fff; font-weight: 600; }
.msg-content code {
  background: #1a1a1a;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 6px;
  font-family: 'Consolas', monospace;
  font-size: 13px;
  color: #e6db74;
}
.msg-content pre {
  background: #1a1a1a;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  overflow-x: auto;
  margin: 10px 0;
}
.msg-content pre code {
  background: none; border: none; padding: 0;
  font-size: 13px; color: #e6db74;
}
.msg-content blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 12px;
  margin: 8px 0;
  color: var(--text-muted);
}
.msg-content table { border-collapse: collapse; width: 100%; margin: 8px 0; }
.msg-content th, .msg-content td {
  border: 1px solid var(--border);
  padding: 8px 12px;
  text-align: left;
}
.msg-content th { background: var(--bg-user); font-weight: 600; }
.msg-content hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
.msg-content a { color: var(--accent-light); }

/* Typing indicator */
.typing-wrap { padding: 6px 20px; max-width: 880px; margin: 0 auto; }
#typing-indicator {
  display: none;
  align-items: center; gap: 14px;
}
#typing-indicator.show { display: flex; }
.typing-dots {
  display: flex; gap: 5px; padding: 12px 0;
}
.typing-dots span {
  width: 7px; height: 7px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: .2s; }
.typing-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce {
  0%,80%,100% { transform: translateY(0); opacity: .4; }
  40%          { transform: translateY(-6px); opacity: 1; }
}

/* Welcome screen */
#welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  text-align: center;
  gap: 20px;
}
.welcome-logo {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, var(--accent), #0d47a1);
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 800; color: #fff;
  box-shadow: 0 8px 32px var(--accent-glow);
}
#welcome h1 { font-size: 26px; font-weight: 600; }
#welcome p  { color: var(--text-muted); font-size: 15px; max-width: 460px; }
.suggestion-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  max-width: 540px;
  width: 100%;
}
.suggestion-btn {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  text-align: left;
  color: var(--text-primary);
  font-size: 13px;
  transition: all var(--transition);
  line-height: 1.4;
}
.suggestion-btn strong { display: block; font-size: 13px; margin-bottom: 2px; color: #fff; }
.suggestion-btn span   { color: var(--text-muted); font-size: 12px; }
.suggestion-btn:hover  { border-color: var(--accent); background: rgba(21,101,192,.1); }

/* ── Input area ───────────────────────────────────────── */
#input-area {
  flex-shrink: 0;
  padding: 16px 20px 20px;
  background: var(--bg-main);
  border-top: 1px solid var(--border);
}
.input-wrap {
  max-width: 880px;
  margin: 0 auto;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 14px;
  display: flex;
  align-items: flex-end;
  gap: 10px;
  padding: 10px 12px;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.input-wrap:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
#user-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text-primary);
  font-size: 15px;
  resize: none;
  max-height: 180px;
  line-height: 1.6;
  padding: 2px 0;
}
#user-input::placeholder { color: var(--text-muted); }
#btn-send {
  width: 36px; height: 36px;
  background: var(--accent);
  border-radius: 10px;
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background var(--transition), opacity var(--transition);
  align-self: flex-end;
}
#btn-send:hover { background: var(--accent-light); }
#btn-send:disabled { opacity: .4; cursor: default; }
.input-hint {
  max-width: 880px;
  margin: 6px auto 0;
  font-size: 11px;
  color: var(--text-dim);
  text-align: center;
}

/* ── Toast ────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: #323232;
  color: #fff;
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 13px;
  opacity: 0;
  transition: opacity .25s;
  pointer-events: none;
  z-index: 999;
}
#toast.show { opacity: 1; }

/* ── Responsive ───────────────────────────────────────── */
@media (max-width: 640px) {
  #sidebar { display: none; }
  .suggestion-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ── Sidebar ──────────────────────────────────── -->
<aside id="sidebar">
  <div class="sidebar-header">
    <div class="logo-badge">VF</div>
    <div class="logo-text">
      VinFast AI
      <span>Tư vấn xe điện</span>
    </div>
  </div>

  <button id="btn-new-chat" onclick="newChat()">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M12 5v14M5 12h14" stroke-linecap="round"/>
    </svg>
    Cuộc trò chuyện mới
  </button>

  <div class="sessions-label">Lịch sử</div>
  <div id="session-list"></div>

  <div class="sidebar-footer">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
    </svg>
    Dữ liệu lưu trong phiên
  </div>
</aside>

<!-- ── Main ─────────────────────────────────────── -->
<main id="main">

  <!-- Top bar -->
  <div id="topbar">
    <div id="topbar-title">Cuộc trò chuyện mới</div>
    <button id="btn-clear" onclick="clearChat()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>
      </svg>
      Xoá chat
    </button>
  </div>

  <!-- Messages -->
  <div id="messages">
    <!-- Welcome -->
    <div id="welcome">
      <div class="welcome-logo">VF</div>
      <h1>Xin chào! Tôi là VinFast AI</h1>
      <p>Tôi có thể tư vấn xe phù hợp, tra cứu bảo hành, tính chi phí sở hữu và đặt lịch lái thử cho bạn.</p>
      <div class="suggestion-grid">
        <button class="suggestion-btn" onclick="sendSuggestion(this)">
          <strong>🚗 Tư vấn mua xe</strong>
          <span>Ngân sách 700 triệu, gia đình 4 người</span>
        </button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">
          <strong>🔧 Bảo dưỡng & bảo hành</strong>
          <span>Thông tin bảo hành xe VF 7</span>
        </button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">
          <strong>💰 Tính giá lăn bánh</strong>
          <span>Chi phí sở hữu VF 7 tại Hà Nội</span>
        </button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">
          <strong>📅 Đặt lịch lái thử</strong>
          <span>Đăng ký lái thử VF 7 Plus</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Typing indicator -->
  <div class="typing-wrap">
    <div id="typing-indicator">
      <div class="avatar bot">VF</div>
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div id="input-area">
    <div class="input-wrap">
      <textarea
        id="user-input"
        rows="1"
        placeholder="Hỏi về xe VinFast... (Enter gửi, Shift+Enter xuống dòng)"
      ></textarea>
      <button id="btn-send" onclick="sendMessage()" disabled>
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">VinFast AI có thể mắc lỗi. Hãy xác minh thông tin quan trọng với đại lý.</div>
  </div>

</main>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────
let sessionId = "";
let isLoading = false;
const sessions = {};   // sid → {preview, msgCount}

// ── Marked config ─────────────────────────────────────
marked.setOptions({
  breaks: true,
  gfm: true,
});

// ── DOM refs ───────────────────────────────────────────
const inputEl   = document.getElementById("user-input");
const sendBtn   = document.getElementById("btn-send");
const msgsEl    = document.getElementById("messages");
const welcomeEl = document.getElementById("welcome");
const typingEl  = document.getElementById("typing-indicator");
const titleEl   = document.getElementById("topbar-title");
const sessionListEl = document.getElementById("session-list");

// ── Auto-resize textarea ───────────────────────────────
inputEl.addEventListener("input", () => {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + "px";
  sendBtn.disabled = inputEl.value.trim() === "" || isLoading;
});

inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) sendMessage();
  }
});

// ── Send message ───────────────────────────────────────
async function sendMessage(text) {
  const msg = (text || inputEl.value).trim();
  if (!msg || isLoading) return;

  hideWelcome();
  appendMessage("user", msg);

  inputEl.value = "";
  inputEl.style.height = "auto";
  sendBtn.disabled = true;
  isLoading = true;
  showTyping(true);

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg, session_id: sessionId }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: "Lỗi server" }));
      throw new Error(err.detail || "Lỗi không xác định");
    }

    const data = await res.json();
    sessionId = data.session_id;

    // Update session store
    sessions[sessionId] = { preview: data.preview, msgCount: (sessions[sessionId]?.msgCount || 0) + 1 };
    renderSessionList();

    showTyping(false);
    appendMessage("bot", data.reply, true);
    updateTitle(data.preview);

  } catch (err) {
    showTyping(false);
    appendMessage("bot", `⚠️ **Lỗi:** ${err.message}\n\nVui lòng thử lại hoặc gọi hotline: **1900 23 23 89**`);
  } finally {
    isLoading = false;
    sendBtn.disabled = inputEl.value.trim() === "";
    inputEl.focus();
  }
}

function sendSuggestion(btn) {
  const title = btn.querySelector("strong").textContent.replace(/^[^\s]+\s/, "");
  const detail = btn.querySelector("span").textContent;
  sendMessage(detail);
}

// ── Append message ─────────────────────────────────────
function appendMessage(role, content, typewrite = false) {
  const isUser = role === "user";
  const now = new Date().toLocaleTimeString("vi-VN", { hour: "2-digit", minute: "2-digit" });

  const wrap = document.createElement("div");
  wrap.className = "msg-wrap";

  const avatar = document.createElement("div");
  avatar.className = `avatar ${isUser ? "user" : "bot"}`;
  avatar.textContent = isUser ? "B" : "VF";

  const body = document.createElement("div");
  body.className = "msg-body";

  const name = document.createElement("div");
  name.className = "msg-name";
  name.innerHTML = `${isUser ? "Bạn" : "VinFast AI"} <span class="msg-time">${now}</span>`;

  const contentEl = document.createElement("div");
  contentEl.className = `msg-content${isUser ? " user-content" : ""}`;

  if (isUser) {
    contentEl.textContent = content;
  } else if (typewrite) {
    contentEl.innerHTML = "";
    body.appendChild(name);
    body.appendChild(contentEl);
    wrap.appendChild(avatar);
    wrap.appendChild(body);
    msgsEl.appendChild(wrap);
    scrollBottom();
    typewriteMarkdown(contentEl, content);
    return;
  } else {
    contentEl.innerHTML = marked.parse(content);
  }

  body.appendChild(name);
  body.appendChild(contentEl);
  wrap.appendChild(avatar);
  wrap.appendChild(body);
  msgsEl.appendChild(wrap);
  scrollBottom();
}

// ── Typewriter effect ──────────────────────────────────
function typewriteMarkdown(el, text) {
  let i = 0;
  const speed = Math.max(4, Math.min(18, 1800 / text.length));
  const buf = [];

  function step() {
    if (i < text.length) {
      buf.push(text[i++]);
      // Re-render every few chars for smooth appearance
      if (i % 6 === 0 || i === text.length) {
        el.innerHTML = marked.parse(buf.join(""));
        scrollBottom();
      }
      setTimeout(step, speed);
    } else {
      el.innerHTML = marked.parse(text);
      scrollBottom();
    }
  }
  step();
}

// ── Helpers ────────────────────────────────────────────
function scrollBottom() {
  msgsEl.scrollTo({ top: msgsEl.scrollHeight, behavior: "smooth" });
}
function showTyping(show) {
  typingEl.classList.toggle("show", show);
  scrollBottom();
}
function hideWelcome() {
  if (welcomeEl) welcomeEl.style.display = "none";
}
function updateTitle(text) {
  titleEl.textContent = text ? (text.length > 60 ? text.slice(0, 60) + "…" : text) : "Cuộc trò chuyện";
}

// ── Session management ─────────────────────────────────
function renderSessionList() {
  sessionListEl.innerHTML = "";
  const entries = Object.entries(sessions).reverse();
  if (entries.length === 0) {
    sessionListEl.innerHTML = `<div style="padding:12px 10px;color:var(--text-dim);font-size:12px;">Chưa có lịch sử</div>`;
    return;
  }
  entries.forEach(([sid, info]) => {
    const item = document.createElement("div");
    item.className = `session-item${sid === sessionId ? " active" : ""}`;
    item.innerHTML = `
      <svg class="session-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
      </svg>
      <span class="session-text">${escHtml(info.preview)}</span>
      <span class="session-count">${info.msgCount}</span>
      <button class="session-delete" onclick="deleteSession('${sid}',event)" title="Xoá">×</button>
    `;
    item.addEventListener("click", () => loadSession(sid));
    sessionListEl.appendChild(item);
  });
}

async function deleteSession(sid, e) {
  e.stopPropagation();
  await fetch(`/api/sessions/${sid}`, { method: "DELETE" });
  delete sessions[sid];
  if (sid === sessionId) newChat();
  else renderSessionList();
  toast("Đã xoá cuộc trò chuyện");
}

function loadSession(sid) {
  // Switch active highlight only (messages not persisted client-side per session for simplicity)
  sessionId = sid;
  renderSessionList();
  updateTitle(sessions[sid]?.preview || "");
}

// ── New chat ───────────────────────────────────────────
function newChat() {
  sessionId = "";
  msgsEl.innerHTML = "";
  msgsEl.appendChild(createWelcome());
  titleEl.textContent = "Cuộc trò chuyện mới";
  renderSessionList();
  inputEl.focus();
}

function createWelcome() {
  const w = document.createElement("div");
  w.id = "welcome";
  w.innerHTML = welcomeEl
    ? welcomeEl.innerHTML
    : `<div class="welcome-logo">VF</div><h1>Xin chào!</h1>`;
  return w;
}

// ── Clear current chat ────────────────────────────────
async function clearChat() {
  if (sessionId) {
    await fetch("/api/reset", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: sessionId }),
    });
    delete sessions[sessionId];
  }
  newChat();
  toast("Đã xoá cuộc trò chuyện hiện tại");
}

// ── Toast ─────────────────────────────────────────────
function toast(msg, duration = 2500) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), duration);
}

function escHtml(str) {
  return (str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── Init ──────────────────────────────────────────────
inputEl.focus();
renderSessionList();
</script>
</body>
</html>
